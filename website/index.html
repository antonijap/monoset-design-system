    <!-- Theme bootstrap. Applies the `monoset-dark` class to the docs-layout
         container the instant React mounts it, so the docs area flips
         without a flash. Landing is never touched. Only reads localStorage;
         OS preference alone doesn't force dark mode on users who haven't
         opted in. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('monoset-theme');
          if (t !== 'dark') return;
          var apply = function (el) {
            if (el && !el.classList.contains('monoset-dark')) {
              el.classList.add('monoset-dark');
            }
          };
          var existing = document.querySelector('[data-ms="docs-layout"]');
          if (existing) { apply(existing); return; }
          var mo = new MutationObserver(function () {
            var el = document.querySelector('[data-ms="docs-layout"]');
            if (el) { apply(el); mo.disconnect(); }
          });
          mo.observe(document.body || document.documentElement, {
            childList: true, subtree: true
          });
          // Safety: stop observing after 5s if docs never loads (user on landing).
          setTimeout(function () { mo.disconnect(); }, 5000);
        } catch (e) {}
      })();
    </script>
