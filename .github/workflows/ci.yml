name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-check:
    name: Build, size-limit, Lighthouse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build packages
        run: |
          npm run build --workspace=@monoset/tokens --if-present
          npm run build --workspace=@monoset/motion
          npm run build --workspace=@monoset/react

      - name: Build website
        run: npm run build --workspace=website

      - name: size-limit
        run: npm run -w website -- size-limit
        continue-on-error: false

      - name: Lighthouse CI
        run: |
          cd website
          npx -y @lhci/cli autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        continue-on-error: true

  a11y:
    name: a11y tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test --workspace=@monoset/react
