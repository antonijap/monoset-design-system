name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-check:
    name: Build, size-limit, Lighthouse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify workflow policy
        run: pnpm test:workflows

      - name: Build packages
        run: |
          pnpm --filter @monoset/tokens build
          pnpm --filter @monoset/motion build
          pnpm --filter @monoset/react build

      - name: Verify packed React package
        run: pnpm --filter @monoset/react verify:package

      - name: Run React browser gates
        run: pnpm --filter @monoset/react test:e2e
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome

      - name: Test website
        run: pnpm --filter website test

      - name: Build website
        run: pnpm --filter website build

      - name: size-limit
        run: pnpm --filter website size-limit
        continue-on-error: false

      - name: Lighthouse CI
        run: pnpm --dir website exec lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        continue-on-error: true

  a11y:
    name: a11y tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @monoset/react test
      - run: pnpm --filter @monoset/react test:contracts:types
